# Golden fixture manifest (ENGINEERING.md "Golden Tests (Byte-Exact)"). Each entry records
# the transform id/version, the input/expected fixture paths, a human description, and the
# SHA-256 of the expected output. The Rust golden test runner
# (crates/tokenfold-core/tests/golden.rs) is the actual byte-equality check; this manifest is
# the human-readable ledger of what's covered and a change-detection record for the expected
# bytes (regenerate the `sha256` field, deliberately, whenever a fixture is intentionally
# updated — see the "Updating golden fixtures" note at the bottom of this file).

[[golden]]
transform_id = "json_minify"
version = "1.0.0"
input = "tests/golden/json_minify/simple_object.in.json"
expected = "tests/golden/json_minify/simple_object.out.json"
description = "Simple object with keys out of alphabetical order and extra whitespace: whitespace stripped, key order preserved"
sha256 = "a1d46c3cdb4e5795c8d637f80daeb578ebb1a9a65dc1ed5f11f51794c3c89f3a"

